# sentinel.yaml — sample project configuration
#
# Run `sentinel` from the sample/ directory:
#   sentinel

version: 1

build-command: cmake -B build && cmake --build build
compiledb-dir: ./build
test-command: >-
  build/test/StackTest --gtest_output=xml:build/test-results/StackTest.xml &&
  build/test/TokenizerTest --gtest_output=xml:build/test-results/TokenizerTest.xml &&
  build/test/CalculatorTest --gtest_output=xml:build/test-results/CalculatorTest.xml
test-result-dir: ./build/test-results
source-dir: ./src

limit: 10
output-dir: ./sentinel_output
