# sentinel.yaml — sample project configuration
#
# Run `sentinel` from the sample/ directory:
#   sentinel

version: 1

build-command: cmake -B build && cmake --build build
compiledb-dir: ./build
test-command: build/test/StackTest --gtest_output=xml:build/test-results/StackTest.xml
test-report-dir: ./build/test-results
source-dir: ./src

limit: 30
output-dir: ./sentinel_output
